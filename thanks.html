<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inquiry received — Hammad Media</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="64x64" href="assets/favicon-64.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,400&family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg-dark: #0b130e; --paper: #f6f4ee; --cream-dim: #a8b0a6; --green: #3ddc84; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Manrope", sans-serif; background: var(--bg-dark); color: var(--paper);
    min-height: 100vh; display: grid; place-items: center; padding: 28px; line-height: 1.6;
  }
  main { max-width: 560px; text-align: center; }
  .mark { font-weight: 800; font-size: 13px; letter-spacing: 0.5em; color: var(--green); text-indent: 0.5em; }
  h1 { font-family: "Fraunces", serif; font-weight: 600; font-size: clamp(34px, 6vw, 52px); line-height: 1.1; margin: 26px 0 18px; }
  h1 em { font-style: italic; color: var(--green); }
  p { color: var(--cream-dim); font-size: 17px; }
  a.back {
    display: inline-block; margin-top: 36px; background: var(--green); color: var(--bg-dark);
    text-decoration: none; padding: 15px 34px; border-radius: 100px; font-weight: 800; font-size: 15px;
  }
  a.back:focus-visible { outline: 2px solid var(--paper); outline-offset: 2px; }
</style>
</head>
<body>
<main>
  <div class="mark">HAMMAD MEDIA</div>
  <h1>Got it — expect my reply <em>within 24 hours</em>.</h1>
  <p>Your inquiry just landed in my inbox. The person who reads it is the person who makes the videos — so come ready to talk products, commissions, and launch timing.</p>
  <a class="back" href="/">Back to the receipts &rarr;</a>
</main>
</body>
</html>
